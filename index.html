<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulateur FIRE – VT & Retraits</title>
  <meta name="description" content="Simulateur FIRE simplifié : contributions par segments, capital VT, retraits dynamiques ou basés sur l'année de départ." />

  <link rel="stylesheet" href="./assets/css/styles.css" />

  <!-- Chart.js doit être chargé AVANT app.js. defer respecte l'ordre -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script type="module" src="./assets/js/app.js"></script>
</head>

<body>
  <header class="topbar">
    <h1 class="title"><span>Simulateur FIRE</span> – VT &amp; Retraits</h1>
  </header>

  <div class="app">
    <!-- Colonne centrale (graph) -->
    <main class="glass center">
      <h2 class="sectionTitle"><span class="bar"></span> Courbe du capital</h2>

      <div class="chartWrap">
        <canvas id="chart"></canvas>
      </div>

      <div class="statusRow">
        <div class="pill"><span class="dot"></span><span id="summary">—</span></div>
        <div class="pill danger">Simulation simplifiée — pas un conseil financier.</div>
      </div>

      <noscript>
        <p class="noscript">Active JavaScript pour utiliser le simulateur.</p>
      </noscript>
    </main>

    <!-- Colonne droite (paramètres) -->
    <aside class="glass panel">
      <h2 class="sectionTitle"><span class="bar"></span> Paramètres</h2>

      <div class="grid2">
        <label for="startYear">Année de début
          <input id="startYear" type="number" value="2025" min="1900" max="2200" />
        </label>
        <label for="endYear">Année de fin
          <input id="endYear" type="number" value="2060" min="1900" max="2200" />
        </label>
      </div>

      <div class="grid2">
        <label for="rate">Rendement annuel (%)
          <input id="rate" type="number" step="0.1" value="5" />
        </label>
        <label for="initial">Capital initial (CHF)
          <input id="initial" type="number" value="0" step="1000" />
        </label>
      </div>

      <div class="grid2">
        <label for="wrMode">Mode de retrait
          <select id="wrMode">
            <option value="percentCurrent">% du capital chaque année (dynamique)</option>
            <option value="percentBase">% du capital à l'année de départ (montant fixe)</option>
          </select>
        </label>
        <label for="wr">Taux de retrait (%)
          <input id="wr" type="number" step="0.1" value="3.5" />
        </label>
      </div>

      <label for="wrStart">Année début des retraits
        <input id="wrStart" type="number" value="2043" min="1900" max="2200" />
      </label>

      <h2 class="sectionTitle sectionTitle--spaced"><span class="bar"></span> Segments</h2>
      <div id="segments" class="segments"></div>
      <button class="addBtn" type="button" id="addSegment">＋ Ajouter un segment</button>
    </aside>
  </div>
</body>
</html>
